    <title>Icons preview – icomoonmds</title>
    <link rel="stylesheet" href="fonts-icomoonmds.css" />
    <link rel="stylesheet" href="icons.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 1.5rem;
        background: #f5f5f5;
      }
      h1 {
        margin: 0 0 0.5rem 0;
        font-size: 1.5rem;
      }
      .note {
        color: #666;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
      }
      .search-wrap {
        margin-bottom: 1rem;
      }
      .search-wrap input {
        padding: 0.5rem 0.75rem;
        width: 100%;
        max-width: 20rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.75rem;
      }
      .icon-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 1rem 0.5rem;
        background: #fff;
        border-radius: 8px;
        border: 1px solid #e0e0e0;
        min-height: 5rem;
      }
      .icon-cell .glyph {
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
        min-height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-cell .name {
        font-size: 0.7rem;
        color: #333;
        text-align: center;
        word-break: break-all;
        line-height: 1.2;
      }
      .icon-cell.hidden {
        display: none;
      }
    </style>
  </head>

      const grid = document.getElementById("grid");
      const searchInput = document.getElementById("search");

      function render() {
        const q = (searchInput.value || "").trim().toLowerCase();
        grid.innerHTML = ICONS.map((cls) => {
          const match = !q || cls.indexOf(q) !== -1;
          return (
            '<div class="icon-cell' +
            (match ? "" : " hidden") +
            '" data-name="' +
            cls +
            '">' +
            '<span class="glyph ' +
            cls +
            '" aria-hidden="true"></span>' +
            '<span class="name">' +
            cls +
            "</span>" +
            "</div>"
          );
        }).join("");
      }

      searchInput.addEventListener("input", render);
      render();
